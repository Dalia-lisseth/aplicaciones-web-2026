<!DOCTYPE html> <!-- Define el tipo de documento HTML5 -->
<html lang="es"> <!-- Indica que el idioma es español -->

<head>
    <meta charset="UTF-8"> <!-- Permite usar tildes y caracteres especiales -->
    <title>Mi Portafolio</title> <!-- Título que aparece en la pestaña -->
    
    <!-- Vincula el archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Encabezado principal -->
    <header>
        <h1>Hola, soy Dayana Anchundia</h1> <!-- Título principal -->
        <p>Estudiante de Ingeniería de Software</p> <!-- Descripción breve -->
    </header>

    <!-- Sección principal -->
    <section class="contenedor">
        <h2>Sobre mí</h2> <!-- Subtítulo -->
        
        <!-- Descripción personal -->
        <p>Me apasiona el arte, las manualidades y aprender cosas nuevas.</p>
        
        <!-- Botón -->
        <button>Contactar</button>

        <!-- Lista de habilidades (para usar Flexbox) -->
        <ul class="habilidades">
            <li>Dibujo</li>
            <li>Manualidades</li>
            <li>Diseño</li>
        </ul>
    </section>
</body>
</html>
