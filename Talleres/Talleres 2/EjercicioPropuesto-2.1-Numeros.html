<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1</title>
</head>
<body>

<script type="text/javascript">

    // Obtiene el valor máximo representable en JavaScript
    var maxValue = Number.MAX_VALUE;

    // Obtiene el valor mínimo representable en JavaScript
    var minValue = Number.MIN_VALUE;

    // Muestra el valor máximo
    alert("Max Value: " + maxValue);

    // Muestra el valor mínimo
    alert("Min Value: " + minValue);

    // Multiplicar el máximo por 2 produce Infinity
    alert("Valor especial: " + maxValue * 2);

</script>

</body>
</html>
