<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2</title>
</head>
<body>

<script type="text/javascript">

    // Solicita el primer valor lógico
    var operando_1 =
    eval(prompt("Introduce el primer valor lógico (true o false):", true));

    // Solicita el segundo valor lógico
    var operando_2 =
    eval(prompt("Introduce el segundo valor lógico (true o false):", true));

    // Aplica el operador lógico AND (&&)
    var resultado_logico = operando_1 && operando_2;

    // Muestra el resultado
    alert("Resultado: " + resultado_logico);

</script>

</body>
</html>
