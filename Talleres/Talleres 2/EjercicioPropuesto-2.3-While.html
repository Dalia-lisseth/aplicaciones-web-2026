<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3</title>
</head>
<body>

<script type="text/javascript">

    // Solicita un número para iniciar la cuenta regresiva
    var countdown = prompt("Introduce un número para iniciar la cuenta atrás:");

    // Mientras el número sea mayor que 0
    while (countdown > 0) {

        // Muestra el número actual
        alert(countdown + "...");

        // Disminuye el valor en 1
        countdown--;
    }

</script>

</body>
</html>
