<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="formulario">
    <h2>Registro de Clientes</h2>

    <form id="formCliente">
        <label>Cédula:</label>
        <input type="text" id="cedula" placeholder="Ingrese su cédula">

        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Ingrese su nombre">

        <label>Dirección:</label>
        <input type="text" id="direccion" placeholder="Ingrese su dirección">

        <label>Teléfono:</label>
        <input type="tel" id="telefono" placeholder="Ingrese su teléfono">

        <label>Correo Electrónico:</label>
        <input type="email" id="correo" placeholder="Ingrese su correo">

        <button type="submit">Guardar</button>
    </form>

    <div class="mensaje" id="mensaje"></div>
</div>

<script src="script.js"></script>
</body>
</html>
